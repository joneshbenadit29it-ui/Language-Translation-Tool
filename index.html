<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTranslate AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>QuickTranslate AI</h1>
        
        <div class="wrapper">
            <div class="text-input">
                <select id="source-lang">
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="hi">Hindi</option>
                </select>
                <textarea id="source-text" placeholder="Enter text here..."></textarea>
                <div class="controls">
                    <button id="speak-source" title="Listen"><i class="fas fa-volume-up"></i></button>
                </div>
            </div>

            <div class="text-input">
                <select id="target-lang">
                    <option value="es">Spanish</option>
                    <option value="en">English</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="hi">Hindi</option>
                </select>
                <textarea id="target-text" placeholder="Translation will appear here..." readonly></textarea>
                <div class="controls">
                    <button id="speak-target" title="Listen"><i class="fas fa-volume-up"></i></button>
                    <button id="copy-target" title="Copy text"><i class="fas fa-copy"></i></button>
                </div>
            </div>
        </div>

        <button id="translate-btn">Translate Text</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
